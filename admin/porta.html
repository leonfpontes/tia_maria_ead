<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Porta – Atendimento</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/assets/vendor/materialize/materialize.min.css" />
  <link rel="stylesheet" href="/assets/css/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="icon" type="image/x-icon" href="/assets/img/Logo_Terr_White-removebg-preview.png" />
  <style>
    body { font-family: Roboto, Arial, sans-serif; background: #0d1a0d; color: #e8f5e9; min-height: 100vh; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); border-radius: .75rem; }
    .input-field { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15); border-radius: .5rem; padding: .65rem .9rem; color: #e8f5e9; width: 100%; font-size: .95rem; }
    .input-field:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
    .input-field::placeholder { color: rgba(232,245,233,.35); }
    .btn { font-weight: 600; border-radius: .5rem; text-transform: none; }
    .btn:hover { opacity: .92; } .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-green  { background: #2d6a2d; color: #fff; }
    .btn-blue   { background: #1e40af; color: #fff; }
    .btn-yellow { background: #78350f; color: #fef08a; }
    .btn-red    { background: #7f1d1d; color: #fca5a5; }
    .btn-gray   { background: rgba(255,255,255,.1); color: #d1d5db; }
    .admin-nav {
      background: rgba(255,255,255,.92);
      border-bottom: 1px solid rgba(148,163,184,.35);
      backdrop-filter: blur(8px);
    }
    .admin-nav-title { color: #166534; }
    .admin-nav-user { color: #334155; }
    .admin-nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .38rem .8rem;
      border-radius: .65rem;
      font-size: .8rem;
      font-weight: 700;
      line-height: 1;
      min-width: 82px;
      justify-content: center;
      border: 1px solid transparent;
      transition: all .15s ease;
    }
    .admin-nav-toggle.active {
      background: #16a34a;
      color: #fff;
      border-color: #15803d;
      box-shadow: 0 4px 12px rgba(22,163,74,.28);
    }
    .admin-nav-toggle.inactive {
      background: #f8fafc;
      color: #334155;
      border-color: rgba(148,163,184,.45);
    }
    .admin-nav-toggle.inactive:hover {
      background: #f1f5f9;
      color: #0f172a;
      border-color: rgba(22,163,74,.35);
    }
    .admin-nav-logout {
      background: #fff;
      color: #166534;
      border: 1px solid rgba(22,163,74,.35);
      font-size: .78rem;
      padding: .38rem .75rem;
    }
    .admin-nav-logout:hover { background: #f0fdf4; }
    .badge { display: inline-flex; align-items: center; padding: .2rem .6rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
    .badge-ativa     { background: rgba(34,197,94,.15); color: #4ade80; }
    .badge-atendida  { background: rgba(96,165,250,.15); color: #93c5fd; }
    .badge-no_show   { background: rgba(234,179,8,.15); color: #fbbf24; }
    .badge-cancelada { background: rgba(239,68,68,.15); color: #f87171; }
    .badge-pref { background: rgba(250,204,21,.2); color: #fef08a; border: 1px solid rgba(250,204,21,.35); }
    .badge-fila { background: rgba(59,130,246,.18); color: #bfdbfe; }
    .senha-card { border-radius: .6rem; padding: .75rem 1rem; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); display: flex; align-items: center; gap: 1rem; }
    .senha-card.proxima { border-color: #4ade80; background: rgba(74,222,128,.07); }
    .senha-num { font-size: 1.75rem; font-weight: 900; color: #4ade80; min-width: 3rem; text-align: center; line-height: 1; font-variant-numeric: tabular-nums; }
    .senha-num.atendida { color: #93c5fd; }
    .senha-num.no_show  { color: #fbbf24; }
    .senha-num.cancelada { color: #6b7280; }
    .metric { text-align: center; }
    .metric-val { font-size: 1.75rem; font-weight: 800; }
    .hidden { display: none !important; }
    select.input-field option { background: #1a2a1a; }
    select.input-field {
      appearance: auto;
      cursor: pointer;
      display: block;
      width: 100%;
      min-height: 44px;
      font-size: 1rem;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    select.input-field:active {
      transform: scale(0.98);
    }
    .senha-actions { display: flex; gap: .35rem; margin-left: auto; }
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 60; display: flex; justify-content: flex-end; }
    .drawer-panel {
      width: min(440px, 100vw);
      height: 100vh;
      background: #122012;
      border-left: 1px solid rgba(255,255,255,.12);
      box-shadow: -12px 0 30px rgba(0,0,0,.35);
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .drawer-header {
      flex-shrink: 0;
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      padding-bottom: 3rem;
    }
    .drawer-body > div {
      margin-bottom: 1rem;
    }
    .drawer-body > div:last-child {
      margin-bottom: 0;
    }
    .walkin-checkbox-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1rem;
    }
    /* Override local para evitar que o Materialize esconda o checkbox nativo. */
    .walkin-checkbox {
      position: static !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      appearance: auto;
      -webkit-appearance: checkbox;
    }
    .walkin-checkbox-label {
      color: #fef08a;
      font-size: .9rem;
      margin: 0;
      cursor: pointer;
      line-height: 1.2;
    }
    @media (max-width: 640px) {
      .drawer-panel { width: 100vw; }
      #nav-user { display: none; }
      .senha-card { flex-wrap: wrap; align-items: flex-start; padding: .7rem .75rem; gap: .6rem; }
      .senha-num { min-width: 2.8rem; font-size: 1.6rem; }
      .senha-card .flex-1 { width: calc(100% - 3.6rem); }
      .senha-actions { width: 100%; margin-left: 0; display: grid; grid-template-columns: 1fr 1fr; }
      .senha-actions .btn { width: 100%; padding: .45rem .4rem !important; font-size: .82rem !important; }
      .metric-val { font-size: 1.5rem; }
      .nav-actions { gap: .4rem; }
      .admin-nav-toggle { min-width: 74px; padding: .35rem .62rem; font-size: .76rem; }
      .admin-nav-logout { padding: .35rem .6rem; font-size: .74rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-panel" class="min-h-screen flex items-center justify-center px-4">
    <div class="card p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <img src="/assets/img/Logo_Terr_White-removebg-preview.png" alt="Logo" class="h-14 w-14 object-contain mx-auto mb-3" />
        <h1 class="text-xl font-bold" style="color:#a8d5a2">Controle de Porta</h1>
      </div>
      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm mb-1" style="color:#a8d5a2">Usuário</label>
          <input id="l-user" type="text" class="input-field" placeholder="username" autocomplete="username" />
        </div>
        <div>
          <label class="block text-sm mb-1" style="color:#a8d5a2">Senha</label>
          <input id="l-pass" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p id="login-error" class="text-xs text-red-400 hidden"></p>
        <button type="submit" id="login-btn" class="btn btn-green w-full">Entrar</button>
      </form>
    </div>
  </div>

  <!-- Porta Panel -->
  <div id="porta-panel" class="hidden">
    <nav class="sticky top-0 z-40 px-4 py-3 admin-nav">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <span class="font-bold admin-nav-title">🚪 Porta</span>
        <div class="flex items-center gap-2 nav-actions">
          <div class="flex items-center gap-2">
            <a href="/admin" class="admin-nav-toggle inactive">Admin</a>
            <a href="/admin/porta" class="admin-nav-toggle active" aria-current="page">📱 Porta</a>
          </div>
          <span id="nav-user" class="text-xs admin-nav-user"></span>
          <button onclick="doLogout()" class="btn admin-nav-logout">Sair</button>
        </div>
      </div>
    </nav>

    <div class="max-w-lg mx-auto px-4 py-5 space-y-4">

      <!-- Selecionar Gira -->
      <div class="card p-4">
        <label class="block text-sm mb-2" style="color:#a8d5a2">Gira</label>
        <select id="gira-select" class="input-field" onchange="onGiraChange()">
          <option value="">Selecione uma gira...</option>
        </select>
      </div>

      <div id="porta-content" class="hidden space-y-4">

        <!-- Busca -->
        <div class="card p-3">
          <input id="busca-input" type="text" class="input-field text-lg" placeholder="Busca por número ou nome..." autofocus oninput="debounceSearch()" />
        </div>

        <!-- Métricas -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <div class="card p-3 metric">
            <div class="metric-val" style="color:#93c5fd" id="m-atendidas">0</div>
            <div class="text-xs mt-1" style="color:#6b9e68">Atendidas</div>
          </div>
          <div class="card p-3 metric">
            <div class="metric-val" style="color:#4ade80" id="m-emitidas">0</div>
            <div class="text-xs mt-1" style="color:#6b9e68">Emitidas</div>
          </div>
          <div class="card p-3 metric">
            <div class="metric-val" style="color:#e8f5e9" id="m-ativas">0</div>
            <div class="text-xs mt-1" style="color:#6b9e68">Restantes</div>
          </div>
          <div class="card p-3 metric">
            <div class="metric-val" style="color:#fbbf24" id="m-noshow">0</div>
            <div class="text-xs mt-1" style="color:#6b9e68">No-Show</div>
          </div>
        </div>

        <!-- Botão Incluir Walk-in -->
        <div class="card p-3">
          <button onclick="abrirDrawerWalkin()" class="btn btn-green w-full">➕ Incluir Walk-in</button>
        </div>

        <!-- Lista Senhas -->
        <div id="lista-senhas" class="space-y-2"></div>

        <div class="text-center text-xs py-2" style="color:#4a6e47" id="refresh-status">Atualiza a cada 30s</div>

      </div><!-- /porta-content -->
    </div>
  </div>

  <script src="/assets/vendor/materialize/materialize.min.js"></script>
  <script>
    let token = localStorage.getItem('admin_token');
    let authUser = JSON.parse(localStorage.getItem('admin_user') || 'null');
    let selectedGiraId = null;
    let allSenhas = [];
    let refreshInterval = null;
    let searchDebounce = null;

    function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers||{}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return fetch(path, { ...opts, headers }).then(async r => {
        if (r.status === 401) { doLogout(); throw new Error('401'); }
        return r;
      });
    }

    function init() {
      if (token && authUser) showPorta();
      else {
        document.getElementById('login-panel').classList.remove('hidden');
        document.getElementById('porta-panel').classList.add('hidden');
      }
    }

    function showPorta() {
      document.getElementById('login-panel').classList.add('hidden');
      document.getElementById('porta-panel').classList.remove('hidden');
      document.getElementById('nav-user').textContent = authUser?.username || '';
      loadGirasSelect();
    }

    function doLogout() {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_user');
      token = null; authUser = null;
      if (refreshInterval) clearInterval(refreshInterval);
      document.getElementById('login-panel').classList.remove('hidden');
      document.getElementById('porta-panel').classList.add('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Entrando...';
      document.getElementById('login-error').classList.add('hidden');
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username: document.getElementById('l-user').value, password: document.getElementById('l-pass').value })
        });
        const data = await r.json();
        if (r.ok) {
          token = data.token; authUser = data.admin;
          localStorage.setItem('admin_token', token);
          localStorage.setItem('admin_user', JSON.stringify(authUser));
          showPorta();
        } else {
          document.getElementById('login-error').textContent = data.mensagem || 'Credenciais inválidas.';
          document.getElementById('login-error').classList.remove('hidden');
        }
      } catch(err) {
        document.getElementById('login-error').textContent = 'Erro de conexão.';
        document.getElementById('login-error').classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });

    async function loadGirasSelect() {
      try {
        console.log('[PORTA] Carregando giras...');
        const r = await api('/api/admin/giras');
        const giras = await r.json();
        console.log('[PORTA] Giras carregadas:', giras);
        const sel = document.getElementById('gira-select');
        sel.innerHTML = '<option value="">Selecione uma gira...</option>';
        const girasPublicadas = (giras || [])
          .filter(g => g.status === 'PUBLICADA')
          .sort((a, b) => new Date(b.data_inicio) - new Date(a.data_inicio));
        console.log('[PORTA] Giras PUBLICADAS:', girasPublicadas);
        girasPublicadas.forEach(g => {
          const opt = document.createElement('option');
          opt.value = g.id;
          opt.textContent = `${g.titulo} – ${g.data_inicio ? new Date(g.data_inicio).toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'}) : ''}`;
          sel.appendChild(opt);
          console.log('[PORTA] Adicionada opção:', opt.textContent);
        });
        if (girasPublicadas.length === 0) {
          sel.innerHTML += '<option disabled>Nenhuma gira publicada</option>';
        }
      } catch(e) { 
        console.error('[PORTA] Erro ao carregar giras:', e);
      }
    }

    function onGiraChange() {
      const val = document.getElementById('gira-select').value;
      console.log('[PORTA] onGiraChange chamado, valor:', val);
      if (refreshInterval) clearInterval(refreshInterval);
      if (!val) {
        selectedGiraId = null;
        document.getElementById('porta-content').classList.add('hidden');
          console.log('[PORTA] Nenhuma gira selecionada, ocultando conteúdo');
        return;
      }
      selectedGiraId = val;
        console.log('[PORTA] Gira selecionada:', selectedGiraId);
      document.getElementById('porta-content').classList.remove('hidden');
      loadSenhas();
      refreshInterval = setInterval(() => {
        const busca = document.getElementById('busca-input').value;
        if (!busca) loadSenhas();
      }, 30000);
    }

    async function loadSenhas(busca = '') {
      if (!selectedGiraId) return;
      let url = `/api/admin/giras/${selectedGiraId}/senhas`;
      if (busca) url += `?busca=${encodeURIComponent(busca)}`;
      try {
        const r = await api(url);
        allSenhas = await r.json();
        renderSenhas(allSenhas);
        updateMetrics(allSenhas);
        document.getElementById('refresh-status').textContent = `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
      } catch(e) { console.error(e); }
    }

    function updateMetrics(rows) {
      document.getElementById('m-atendidas').textContent = rows.filter(s=>s.status==='ATENDIDA').length;
      document.getElementById('m-emitidas').textContent = rows.filter(s=>s.status!=='CANCELADA').length;
      document.getElementById('m-ativas').textContent = rows.filter(s=>s.status==='ATIVA').length;
      document.getElementById('m-noshow').textContent = rows.filter(s=>s.status==='NO_SHOW').length;
    }

    function renderSenhas(rows) {
      const lista = document.getElementById('lista-senhas');
      if (!rows || rows.length === 0) {
        lista.innerHTML = '<p class="text-center py-6" style="color:#6b9e68">Nenhuma senha encontrada.</p>';
        return;
      }
      const proximaIdx = rows.findIndex(s => s.status === 'ATIVA');
      const filaPosMap = new Map();
      let filaPos = 0;
      rows.forEach(s => {
        if (s.status === 'ATIVA' && s.chegada_em) {
          filaPos += 1;
          filaPosMap.set(Number(s.id), filaPos);
        }
      });
      lista.innerHTML = rows.map((s, idx) => {
        const isProxima = idx === proximaIdx;
        const st = (s.status || '').toLowerCase();
        const numClass = s.status === 'ATENDIDA' ? 'atendida' : s.status === 'NO_SHOW' ? 'no_show' : s.status === 'CANCELADA' ? 'cancelada' : '';
        const atendidaInfo = s.status === 'ATENDIDA' && s.atendida_em
          ? `<span class="text-xs" style="color:#6b9e68">${new Date(s.atendida_em).toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'})}</span>`
          : '';
        const chegadaInfo = s.chegada_em
          ? `<div class="text-xs mt-1" style="color:#93c5fd">✓ Chegou às ${new Date(s.chegada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'})}</div>`
          : `<div class="text-xs mt-1" style="color:#fbbf24">🕐 Aguardando check-in na porta</div>`;
        const filaBadge = s.status === 'ATIVA' && s.chegada_em && filaPosMap.has(Number(s.id))
          ? `<span class="badge badge-fila">#${filaPosMap.get(Number(s.id))} na fila</span>`
          : '';
        const prefBadge = s.is_preferencial
          ? '<span class="badge badge-pref">⭐ Preferencial</span>'
          : '';
        const checkinBtn = s.status === 'ATIVA' && !s.chegada_em
          ? `<button class="btn btn-blue btn-checkin" data-id="${Number(s.id)}" style="padding:.45rem .9rem;font-size:.8rem">📍 Check-in</button>`
          : '';
        const actions = s.status === 'ATIVA'
          ? `
          <div class="senha-actions">
            ${checkinBtn}
            <button class="btn btn-green btn-acao" data-id="${Number(s.id)}" data-status="ATENDIDA" style="padding:.45rem .9rem;font-size:.8rem">✓ Atendida</button>
            <button class="btn btn-yellow btn-acao" data-id="${Number(s.id)}" data-status="NO_SHOW" style="padding:.45rem .9rem;font-size:.8rem">No-Show</button>
          </div>`
          : (s.status === 'ATENDIDA' || s.status === 'NO_SHOW')
            ? `
          <div class="senha-actions">
            <button class="btn btn-gray btn-acao" data-id="${Number(s.id)}" data-status="ATIVA" style="padding:.45rem .9rem;font-size:.8rem">↩ Desfazer</button>
          </div>`
            : '';
        return `<div class="senha-card${isProxima?' proxima':''}">
          <div class="senha-num ${numClass}">#${String(s.numero).padStart(2,'0')}</div>
          <div class="flex-1 min-w-0">
            <div class="font-semibold truncate">${esc(normalizeDisplayText(s.nome))}</div>
            ${chegadaInfo}
            <div class="flex items-center gap-2 mt-1">
              <span class="badge badge-${st === 'no_show' ? 'no_show' : st}">${s.status}</span>
              ${prefBadge}
              ${filaBadge}
              ${atendidaInfo}
              ${isProxima ? '<span class="text-xs font-bold" style="color:#4ade80">← PRÓXIMO</span>' : ''}
            </div>
          </div>
          ${actions}
        </div>`;
      }).join('');
    }

    async function patchStatus(id, status, triggerBtn) {
      const originalText = triggerBtn ? triggerBtn.textContent : '';
      if (triggerBtn) {
        triggerBtn.disabled = true;
        triggerBtn.textContent = '...';
      }
      try {
        const r = await api(`/api/admin/senhas/${id}/status`, { method: 'PATCH', body: JSON.stringify({ status }) });
        if (r.ok) {
          loadSenhas(document.getElementById('busca-input').value);
        } else {
          const d = await r.json();
          alert(d.mensagem || 'Erro ao atualizar status da senha.');
        }
      } catch(e) {
        console.error(e);
        alert('Erro de conexão ao atualizar status.');
      } finally {
        if (triggerBtn) {
          triggerBtn.disabled = false;
          triggerBtn.textContent = originalText;
        }
      }
    }

    async function realizarCheckin(id, triggerBtn) {
      const originalText = triggerBtn ? triggerBtn.textContent : '';
      if (triggerBtn) {
        triggerBtn.disabled = true;
        triggerBtn.textContent = '...';
      }
      try {
        const r = await api(`/api/admin/senhas/${id}/checkin`, { method: 'PATCH' });
        if (r.ok) {
          loadSenhas(document.getElementById('busca-input').value);
        } else {
          const d = await r.json();
          alert(d.mensagem || 'Erro ao registrar check-in.');
        }
      } catch (e) {
        console.error(e);
        alert('Erro de conexão ao registrar check-in.');
      } finally {
        if (triggerBtn) {
          triggerBtn.disabled = false;
          triggerBtn.textContent = originalText;
        }
      }
    }

    // Event delegation for action buttons (avoids inline onclick with dynamic IDs)
    document.getElementById('lista-senhas').addEventListener('click', function(e) {
      const checkinBtn = e.target.closest('.btn-checkin');
      if (checkinBtn) {
        const id = parseInt(checkinBtn.dataset.id, 10);
        if (id) realizarCheckin(id, checkinBtn);
        return;
      }
      const btn = e.target.closest('.btn-acao');
      if (!btn) return;
      const id = parseInt(btn.dataset.id, 10);
      const status = btn.dataset.status;
      if (id && status) patchStatus(id, status, btn);
    });

    function debounceSearch() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        const val = document.getElementById('busca-input').value;
        loadSenhas(val);
      }, 300);
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function normalizeDisplayText(value) {
      if (value === null || value === undefined) return '';
      const text = String(value);
      try {
        const decoded = decodeURIComponent(escape(text));
        return decoded;
      } catch {
        return text;
      }
    }

    // ---- WALK-IN ----
    function abrirDrawerWalkin() {
      document.getElementById('walkin-nome').value = '';
      document.getElementById('walkin-telefone').value = '';
      document.getElementById('walkin-email').value = '';
      document.getElementById('walkin-preferencial').checked = false;
      document.getElementById('walkin-error').classList.add('hidden');
      document.getElementById('walkin-drawer-overlay').classList.remove('hidden');
      setTimeout(() => document.getElementById('walkin-nome').focus(), 100);
    }

    function fecharDrawerWalkin(event) {
      if (event && event.target && event.target.id !== 'walkin-drawer-overlay') return;
      document.getElementById('walkin-drawer-overlay').classList.add('hidden');
    }

    function formatarTelefone(input) {
      let valor = input.value.replace(/\D/g, '');
      if (valor.length <= 2) {
        input.value = valor;
      } else if (valor.length <= 6) {
        input.value = `(${valor.slice(0,2)}) ${valor.slice(2)}`;
      } else if (valor.length <= 10) {
        input.value = `(${valor.slice(0,2)}) ${valor.slice(2,6)}-${valor.slice(6)}`;
      } else {
        input.value = `(${valor.slice(0,2)}) ${valor.slice(2,7)}-${valor.slice(7,11)}`;
      }
    }

    async function salvarWalkin() {
      if (!selectedGiraId) {
        document.getElementById('walkin-error').textContent = 'Nenhuma gira selecionada.';
        document.getElementById('walkin-error').classList.remove('hidden');
        return;
      }

      const nome = document.getElementById('walkin-nome').value.trim();
      if (!nome || nome.length < 2) {
        document.getElementById('walkin-error').textContent = 'Nome é obrigatório (mínimo 2 caracteres).';
        document.getElementById('walkin-error').classList.remove('hidden');
        return;
      }

      const telefone = document.getElementById('walkin-telefone').value.trim();
      const email = document.getElementById('walkin-email').value.trim();
      const is_preferencial = document.getElementById('walkin-preferencial').checked;

      const btn = document.getElementById('walkin-salvar-btn');
      btn.disabled = true;
      btn.textContent = 'Salvando...';
      document.getElementById('walkin-error').classList.add('hidden');

      try {
        const body = { nome, is_preferencial };
        if (telefone) body.telefone = telefone;
        if (email) body.email = email;

        const r = await api(`/api/admin/giras/${selectedGiraId}/senhas/walk-in`, {
          method: 'POST',
          body: JSON.stringify(body)
        });
        const data = await r.json();

        if (r.ok) {
          fecharDrawerWalkin();
          loadSenhas();
          M.toast({ html: `✅ Walk-in #${data.numero} registrado - ${data.nome}`, classes: 'green', displayLength: 3000 });
        } else {
          document.getElementById('walkin-error').textContent = data.mensagem || 'Erro ao criar walk-in.';
          document.getElementById('walkin-error').classList.remove('hidden');
        }
      } catch (e) {
        console.error(e);
        document.getElementById('walkin-error').textContent = 'Erro de conexão ao criar walk-in.';
        document.getElementById('walkin-error').classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Salvar Walk-in';
      }
    }

    // ESC key para fechar drawer
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const walkinOverlay = document.getElementById('walkin-drawer-overlay');
        if (walkinOverlay && !walkinOverlay.classList.contains('hidden')) {
          fecharDrawerWalkin();
        }
      }
    });

    init();
  </script>

  <!-- Drawer Walk-in -->
  <div id="walkin-drawer-overlay" class="drawer-overlay hidden" onclick="fecharDrawerWalkin(event)">
    <aside class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header flex justify-between items-center">
        <h3 class="font-bold text-lg" style="color:#a8d5a2">➕ Incluir Walk-in</h3>
        <button class="btn btn-gray btn-sm" onclick="fecharDrawerWalkin()" style="padding:.4rem .75rem;font-size:.8rem">Fechar</button>
      </div>
      <div class="drawer-body">
        <div>
          <label class="block text-sm mb-1" style="color:#a8d5a2">Nome completo *</label>
          <input id="walkin-nome" type="text" class="input-field" placeholder="Ex: Maria da Silva" />
        </div>
        <div>
          <label class="block text-sm mb-1" style="color:#a8d5a2">Telefone (opcional)</label>
          <input id="walkin-telefone" type="tel" class="input-field" placeholder="(11) 98765-4321" oninput="formatarTelefone(this)" />
        </div>
        <div>
          <label class="block text-sm mb-1" style="color:#a8d5a2">E-mail (opcional)</label>
          <input id="walkin-email" type="email" class="input-field" placeholder="nome@exemplo.com" />
        </div>
        <div class="walkin-checkbox-row">
          <input id="walkin-preferencial" type="checkbox" class="walkin-checkbox" />
          <label for="walkin-preferencial" class="walkin-checkbox-label">
            ⭐ Atendimento preferencial
          </label>
        </div>
        <p class="text-xs" style="color:#6b9e68;margin-top:.25rem;margin-left:1.75rem">Lei Federal 10.048/2000</p>
        <p id="walkin-error" class="text-sm text-red-400 hidden" style="margin-top:1rem"></p>
        <div class="flex justify-end gap-2" style="margin-top:1.5rem">
          <button class="btn btn-gray" onclick="fecharDrawerWalkin()">Cancelar</button>
          <button id="walkin-salvar-btn" class="btn btn-green" onclick="salvarWalkin()">💾 Salvar Walk-in</button>
        </div>
      </div>
    </aside>
  </div>

</body>
</html>
